<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="100%" style="stop-color:#0F0F18"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F0C866"/>
      <stop offset="100%" style="stop-color:#D4A843"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A843;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#D4A843" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow circle -->
  <ellipse cx="600" cy="315" rx="400" ry="300" fill="url(#glow)"/>

  <!-- Top border line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#gold)"/>

  <!-- Logo mark -->
  <text x="80" y="120" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#D4A843" letter-spacing="2">THE GOLDEN SIGNATURE</text>

  <!-- Divider -->
  <rect x="80" y="140" width="120" height="2" fill="#D4A843" opacity="0.5"/>

  <!-- Main headline -->
  <text x="80" y="260" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#F5F5F0" letter-spacing="-2">We Build Software</text>
  <text x="80" y="350" font-family="Georgia, serif" font-size="72" font-weight="700" fill="url(#gold)" letter-spacing="-2">That Thinks.</text>

  <!-- Subtitle -->
  <text x="80" y="420" font-family="Arial, sans-serif" font-size="24" fill="#888880" letter-spacing="1">Custom AI Solutions · Built on AWS · Dallas, Texas</text>

  <!-- Bottom tag -->
  <rect x="80" y="510" width="220" height="44" rx="22" fill="#D4A843" fill-opacity="0.12" stroke="#D4A843" stroke-opacity="0.3" stroke-width="1"/>
  <text x="190" y="538" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#D4A843" text-anchor="middle" letter-spacing="2">THEGOLDENSIGNATURE.COM</text>

  <!-- Decorative mark -->
  <text x="1100" y="340" font-family="Georgia, serif" font-size="120" fill="#D4A843" fill-opacity="0.08" text-anchor="middle">✦</text>
</svg>
